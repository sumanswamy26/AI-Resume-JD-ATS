<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HireLens AI</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    <div class="logo">HireLens AI</div>
    <span class="brand-tag">AI Resume Analyzer</span>
  </div>

  <div class="navbar-actions">
    <div class="profile-menu">
      <button type="button" class="profile-chip" id="profileToggle" aria-expanded="false" aria-haspopup="true">
        <div class="profile-avatar">{{ session.user[:1] | upper }}</div>
        <div class="profile-meta">
          <span class="profile-label">Logged in as</span>
          <span class="profile-name">{{ session.user }}</span>
        </div>
        <span class="profile-caret">▾</span>
      </button>

      <div class="profile-dropdown" id="profileDropdown" hidden>
        <form action="/logout" method="POST">
          <button type="submit" class="dropdown-logout">Logout</button>
        </form>
      </div>
    </div>
  </div>
</nav>

<script>
(function () {
  const activeKey = "hirelens_browser_session";
  const loginToken = "{{ login_token or '' }}";
  const serverToken = "{{ browser_login_token or '' }}";
  const hasActiveSession = sessionStorage.getItem(activeKey) === "1";

  if (loginToken && serverToken && loginToken === serverToken) {
    sessionStorage.setItem(activeKey, "1");
    window.history.replaceState({}, document.title, window.location.pathname);
    return;
  }

  if (!hasActiveSession) {
    fetch("/logout", {
      method: "POST",
      keepalive: true,
      headers: { "X-Requested-With": "XMLHttpRequest" }
    }).finally(function () {
      window.location.href = "/login";
    });
  }
})();

(function () {
  const toggle = document.getElementById("profileToggle");
  const menu = document.getElementById("profileDropdown");

  if (!toggle || !menu) return;

  function closeMenu() {
    menu.hidden = true;
    toggle.setAttribute("aria-expanded", "false");
  }

  function openMenu() {
    menu.hidden = false;
    toggle.setAttribute("aria-expanded", "true");
  }

  toggle.addEventListener("click", function (event) {
    event.stopPropagation();
    if (menu.hidden) {
      openMenu();
    } else {
      closeMenu();
    }
  });

  document.addEventListener("click", closeMenu);
  document.addEventListener("keydown", function (event) {
    if (event.key === "Escape") {
      closeMenu();
    }
  });
})();
</script>

<section class="hero">
  <h1>AI Resume – JD ATS Match Analyzer</h1>
  <p>Optimize your resume for jobs using AI-powered ATS analysis.</p>
</section>

<div class="container">
  <form action="/analyze" method="POST" enctype="multipart/form-data" class="card">

    <label>Upload Resume (PDF)</label>
    <input type="file" name="resume" required>

    <label>Paste Job Description</label>
    <textarea name="jd" rows="10" placeholder="Paste job description here..." required></textarea>

    <button type="submit">Analyze Resume</button>

  </form>
</div>

</body>
</html>

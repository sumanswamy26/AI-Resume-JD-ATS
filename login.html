<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white d-flex justify-content-center align-items-center" style="height:100vh;">

<div class="card p-4 shadow-lg" style="width:350px;">
    <h3 class="text-center mb-3 text-dark">Login</h3>

    <form method="POST">
        <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
        <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
        <button class="btn btn-primary w-100">Login</button>
    </form>

    <p class="text-danger mt-2 text-center">
        {% for msg in get_flashed_messages() %}
            {{msg}}
        {% endfor %}
    </p>

    <p class="text-center text-dark mt-2">
        No account? <a href="/register">Register</a>
    </p>
</div>

</body>
</html>
